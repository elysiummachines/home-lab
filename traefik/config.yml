    proxmox2:
      entryPoints:
        - "https"
      rule: "Host(`proxmox2.local.domain_name`)"
      middlewares:
        - secured
        - proxmox-timeout
      tls:
        certResolver: cloudflare
      service: proxmox2

    qnap:
      entryPoints:
        - "https"
      rule: "Host(`qnap.local.domain_name`)"
      middlewares:
        - secured
      tls:
        certResolver: cloudflare
      service: qnap

    opnsense:
      entryPoints:
        - "https"
      rule: "Host(`opn-sense.local.domain_name`)"
      middlewares:
        - secured
        - no-http3
      tls:
        certResolver: cloudflare
      service: opnsense

# === Services === #
  services:
    dockge:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:5001"
        passHostHeader: true

    dockge3:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:5001"
        passHostHeader: true

    dockge4:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:5001"
        passHostHeader: true

    uptime-kuma:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:3001"
        passHostHeader: true

    portainer:
      loadBalancer:
        servers:
          - url: "https://IP_ADDRESS:9443"
        passHostHeader: true

    tracker:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:8686"
        passHostHeader: true

    wazuh.dashboard:
      loadBalancer:
        servers:
          - url: "https://IP_ADDRESS:7443"
        passHostHeader: true

    obsidian:
      loadBalancer:
        servers:
          - url: "https://IP_ADDRESS:33001"
        passHostHeader: true

    pihole:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:80"
        passHostHeader: true

    pihole2:
      loadBalancer:
        servers:
            - url: "http://IP_ADDRESS:80"
        passHostHeader: true

    sonarr:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:8989"
        passHostHeader: true

    radarr:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:7878"
        passHostHeader: true

    jackett:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:9117"
        passHostHeader: true

    qbittorrent:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:8080"
        passHostHeader: true

    plex:
      loadBalancer:
        servers:
          - url: "https://IP_ADDRESS:32400"
        passHostHeader: true

    jellyfin:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:8096"
        passHostHeader: true

    gitlab:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:8929"
        passHostHeader: true

    kali-linux:
      loadBalancer:
        servers:
          - url: "https://IP_ADDRESS:3002"
        passHostHeader: true

    homepage:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:3000"
        passHostHeader: true

    sonarqube:
      loadBalancer:
        servers:
          - url: "http://IP_ADDRESS:9000"
        passHostHeader: true

    proxmox1:
      loadBalancer:
        servers:
          - url: "https://IP_ADDRESS:8006"
        passHostHeader: true
        responseForwarding:
          flushInterval: 100ms
        serversTransport: proxmox-transport

    proxmox2:
      loadBalancer:
        servers:
          - url: "https://IP_ADDRESS:8006"
        passHostHeader: true
        responseForwarding:
          flushInterval: 100ms
        serversTransport: proxmox-transport

    qnap:
      loadBalancer:
        servers:
          - url: "https://IP_ADDRESS:1148"
        passHostHeader: true

    opnsense:
      loadBalancer:
        servers:
          - url: "https://IP_ADDRESS:443"
        passHostHeader: true
        serversTransport: opnsense-transport

# === Middlewares === #
  middlewares:
    https-redirectscheme:
      redirectScheme:
        scheme: https
        permanent: true

    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https
         # X-Forwarded-For: ""
         # X-Real-IP: ""

    proxmox-timeout:
      buffering:
        maxRequestBodyBytes: 0
        maxResponseBodyBytes: 0
        memRequestBodyBytes: 0
        memResponseBodyBytes: 0

    default-whitelist:
      ipAllowList:
        sourceRange:
          - "192.168.0.0/16"
          - "172.16.0.0/12"
          - "10.0.0.0/8"
          - "40.40.40.0/24"

    crowdsec-bouncer:
      forwardAuth:
        address: http://crowdsec-bouncer:8080/api/v1/forwardAuth
        trustForwardHeader: true
        maxBodySize: 1048576

    secured:
      chain:
        middlewares:
          - default-whitelist
          - default-headers
          - crowdsec-bouncer

    secured-no-crowdsec:
      chain:
        middlewares:
          - default-whitelist
          - default-headers

    no-http3:
      headers:
        customResponseHeaders:
          Alt-Svc: "none"

# === Servers Transports === #
  serversTransports:
    proxmox-transport:
      serverName: "proxmox"
      insecureSkipVerify: true
    opnsense-transport:
      insecureSkipVerify: true


tcp:
  routers:

# === Routes === #
    gitlab-ssh:
      entryPoints:
        - "ssh-gitlab"
      rule: "HostSNI(`*`)"
      service: gitlab-ssh

# === Services === #
  services:
    gitlab-ssh:
      loadBalancer:
        servers:
          - address: "IP_ADDRESS:3200"